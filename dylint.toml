[workspace.metadata.dylint]
libraries = [
    { git = "https://github.com/KSXGitHub/perfectionist", tag = "0.0.0-rc.19" },
]

# `import_grouping_mismatch` and `unordered_derives` (renamed from
# `import_grouping` and `derive_ordering`) became inactive by default in
# `0.0.0-rc.19`. Enable them to keep enforcing this project's import layout
# and derive ordering.
[perfectionist]
enable = ["import_grouping_mismatch", "unordered_derives"]

["perfectionist::unordered_derives"]
style = "prefix_then_alphabetical"
prefix = [
    "Debug", "Display", "Error",
    "Default", "SmartDefault",
    "Clone", "Copy",
    "PartialEq", "Eq", "PartialOrd", "Ord",
    "Hash",
    "AsRef", "AsMut", "Deref", "DerefMut",
    "From", "Into", "TryFrom", "TryInto", "FromStr",
    "IntoIterator",
    "Add", "AddAssign", "Sub", "SubAssign", "Mul", "MulAssign", "Div", "DivAssign",
    "Sum", "Product",
    "LowerHex", "UpperHex", "Octal",
]

["perfectionist::import_granularity_mismatch"]
style = "module"

# Under `single_block` the `#[cfg(...)]`-gated imports are carved into their
# own trailing block automatically (`cfg_block_handling = "trailing"`, the
# default), so the per-file suppressions this project carried under rc.18 are
# no longer necessary.
["perfectionist::import_grouping_mismatch"]
style = "single_block"

["perfectionist::impure_macro_arguments"]
deny_extra = ["debug_assert_op", "debug_assert_op_expr"]
allow_extra = ["assert_op_expr"]

["perfectionist::single_letter_closure_param"]
extra_trivial_callback_methods = ["sort_reflection_by"]
