name: Dylint

on:
  - push
  - pull_request

jobs:
  dylint_check:
    name: Dylint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache
        uses: actions/cache@v5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: |
            ~/.cargo
            ~/.dylint_drivers
            target
          key: ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-${{ hashFiles('dylint.toml') }}-
            ${{ github.job }}-${{ runner.os }}-${{ hashFiles('rust-toolchain') }}-

      - name: Install Rust
        shell: bash
        run: |
          installer=$(mktemp -d)/install-rustup
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > $installer
          bash $installer --default-toolchain $(cat rust-toolchain) -y

      - name: Install dylint tooling
        shell: bash
        run: cargo install --locked cargo-dylint dylint-link

      # The third entry in `restore-keys` above falls back to any cache for the
      # same `rust-toolchain`, including caches built against an older
      # `dylint.toml`. `cargo dylint` does not always detect a changed `git`
      # `rev`/`tag` and may reuse the cached `libperfectionist.so` from the
      # prior `dylint.toml`. Removing the dylint cache directory forces a
      # fresh library build for the current `dylint.toml`. The `~/.cargo`
      # registry cache is preserved, so dependency downloads stay fast.
      - name: Invalidate stale dylint build artifacts
        shell: bash
        run: rm -rf target/dylint

      - name: Run dylint
        shell: bash
        env:
          FMT: 'false'
          LINT: 'false'
          DOC: 'false'
          BUILD: 'false'
          TEST: 'false'
          DYLINT: 'true'
        run: ./test.sh

      - name: Clean workspace artifacts before cache
        if: always()
        continue-on-error: true
        shell: bash
        run: cargo clean --workspace
